[profile.default]
src = 'src'
test = 'tests'
script = 'scripts'
out = 'out'
libs = ['lib']
remappings = [
]
fs_permissions = [{ access = "write", path = "./reports" }]
evm_version = 'shanghai'
solc = '0.8.20'
auto_detect_solc = true

[profile.linea]
optimizer = true
optimizer_runs = 200
evm_version = 'london'
bytecode_hash = 'none'

[profile.celo]
optimizer = true
optimizer_runs = 200
evm_version = 'paris'
bytecode_hash = 'none'

[profile.zksync]
test = 'zksync'
libs = ['lib']
solc = '0.8.26'
evm_version = 'shanghai'

[profile.zksync.zksync]
bytecode_hash = 'none'
compile = true
fallback_oz = true
mode = '3'
zksolc = '1.5.3'


[rpc_endpoints]
mainnet = "${RPC_MAINNET}"
optimism = "${RPC_OPTIMISM}"
avalanche = "${RPC_AVALANCHE}"
polygon = "${RPC_POLYGON}"
arbitrum = "${RPC_ARBITRUM}"
fantom = "${RPC_FANTOM}"
harmony = "${RPC_HARMONY}"
metis = "${RPC_METIS}"
base = "${RPC_BASE}"
zkevm = "${RPC_ZKEVM}"
gnosis = "${RPC_GNOSIS}"
bnb = "${RPC_BNB}"
celo = "${RPC_CELO}"
ethereum_sepolia = "${RPC_ETHEREUM_SEPOLIA}"
avalanche_fuji = "${RPC_AVALANCHE_FUJI}"
base_sepolia = "${RPC_BASE_SEPOLIA}"
scroll = "${RPC_SCROLL}"
zksync = "${RPC_ZKSYNC}"
linea = "${RPC_LINEA}"
sonic = "${RPC_SONIC}"
mantle = "${RPC_MANTLE}"
ink = "${RPC_INK}"
plasma = "${RPC_PLASMA}"
xlayer = "${RPC_XLAYER}"
megaeth =  "${RPC_MEGAETH}"

